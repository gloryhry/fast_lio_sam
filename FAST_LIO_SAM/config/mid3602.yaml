common:
#RS LiDar
    lid_topic: "livox/lidar"
    imu_topic: "livox/imu"
    gnss_topic: "/fix"
    time_sync_en: false         # ONLY turn on when external time synchronization is really not possible

preprocess:
    lidar_type: 5                # 1 for Livox serials LiDAR, 2 for Velodyne LiDAR, 3 for ouster LiDAR, 4 RS
    scan_line: 4
    scan_rate: 10                # only need to be set for velodyne, unit: Hz,
    blind: 0.3

# 地面分割
ground_segmentation:
    enable: true                          # 是否启用地面点云分割
    ground_distance: 3.75                  # 候选地面点XY范围 (m)
    clip_hight: 0.3                        # 地面以上裁剪高度 (m)
    ground_distancethreshold: 0.2          # RANSAC平面拟合距离阈值 (m)
    base_link_hight: 0.5                   # base_link原点距真实地面高度 (m)
    min_distance_f: 0.05                   # 前方虚拟地面点范围 (m)
    min_distance_b: 0.5                    # 后方虚拟地面点范围 (m)
    min_distance_l: 0.25                   # 左方虚拟地面点范围 (m)
    min_distance_r: 0.25                   # 右方虚拟地面点范围 (m)
    extra_ground_filter_num: 2             # 降采样间隔 (1/N个点用于分割)

mapping:
    acc_cov: 0.1
    gyr_cov: 0.1
    b_acc_cov: 0.0001
    b_gyr_cov: 0.0001
    fov_degree:    360
    det_range:     100.0
    extrinsic_est_en:  false      # true: enable the online estimation of IMU-LiDAR extrinsic,
    extrinsic_T: [ -0.011, -0.02329, 0.04412 ]
    extrinsic_R: [ 1, 0, 0,
                   0, 1, 0,
                   0, 0, 1]

localization:
    auto_localization_enable: true
    initframe_FitnessScore: 0.1
    search_radius: 20.0
    localmap_leafsize: 0.1
    icp_correspondence_dist: 20.0
    icp_max_iters: 100
    safe_speed: 15.0

# 输入坐标转换（可选）
input_transform:
    enable: true  # 是否启用输入坐标转换

    # IMU 原始坐标系到 base_link 的外参
    imu_to_baselink_T: [0.0, 0.0, 0.0]
    imu_to_baselink_R: [0.90631, 0.00000, 0.42262, 0.00000, 1.00000, 0.00000, -0.42262, 0.00000, 0.90631]

    # Lidar 原始坐标系到 base_link 的外参
    lidar_to_baselink_T: [0.0, 0.0, 0.0]
    lidar_to_baselink_R: [0.90631, 0.00000, 0.42262, 0.00000, 1.00000, 0.00000, -0.42262, 0.00000, 0.90631]

publish:
    path_en:  true
    scan_publish_en:  true       # false: close all the point cloud output
    dense_publish_en: true       # false: low down the points number in a global-frame point clouds scan.
    scan_bodyframe_pub_en: true  # true: output the point cloud scans in IMU-body-frame

pcd_save:
    pcd_save_en: false
    interval: -1                 # how many LiDAR frames saved in each pcd file; 
                                 # -1 : all frames will be saved in ONE pcd file, may lead to memory crash when having too much frames.

# voxel filter paprams
odometrySurfLeafSize: 0.3                     # default: 0.4 - outdoor, 0.2 - indoor
mappingCornerLeafSize: 0.15                    # default: 0.2 - outdoor, 0.1 - indoor
mappingSurfLeafSize: 0.3                      # default: 0.4 - outdoor, 0.2 - indoor

# robot motion constraint (in case you are using a 2D robot)
z_tollerance: 1000                            # meters
rotation_tollerance: 1000                     # radians

# CPU Params
numberOfCores: 4                              # number of cores for mapping optimization
mappingProcessInterval: 0.15                  # seconds, regulate mapping frequency

# Surrounding map
surroundingkeyframeAddingDistThreshold: 1.0   # meters, regulate keyframe adding threshold
surroundingkeyframeAddingAngleThreshold: 0.2  # radians, regulate keyframe adding threshold
surroundingKeyframeDensity: 2.0               # meters, downsample surrounding keyframe poses   
surroundingKeyframeSearchRadius: 50.0         # meters, within n meters scan-to-map optimization (when loop closure disabled)

# Loop closure
loopClosureEnableFlag: true                   # use loopclousre or not 
loopClosureFrequency: 0.2                    # Hz, regulate loop closure constraint add frequency
surroundingKeyframeSize: 20                   # submap size (when loop closure enabled)
historyKeyframeSearchRadius: 3             # meters, key frame that is within n meters from current pose will be considerd for loop closure
historyKeyframeSearchTimeDiff: 30.0           # seconds, key frame that is n seconds older will be considered for loop closure
historyKeyframeSearchNum: 20                  # number of hostory key frames will be fused into a submap for loop closure
historyKeyframeFitnessScore: 0.3              # icp threshold, the smaller the better alignment

# GPS Settings
useImuHeadingInitialization: true           # if using GPS data, set to "true"
useGpsElevation: true                      # if GPS elevation is bad, set to "false"
gpsCovThreshold: 0.001                        # m^2, threshold for using GPS data
gpsCovThreshold_Z: 0.1                        # m^2, threshold for Z(elevation) GPS covariance
poseCovThreshold: 25.0 #25.0                      # m^2, threshold for using GPS data  位姿协方差阈值 from isam2
gnss_calib_min_match: 50                     #   最少匹配点对数
gnss_calib_max_time_diff: 0.5                #   最大时间匹配容差

# gpsCovThreshold: 0.1                        # m^2, threshold for using GPS data
# poseCovThreshold: 0.25 #25.0                      # m^2, threshold for using GPS data  位姿协方差阈值 from isam2


# Visualization
globalMapVisualizationSearchRadius: 1000.0    # meters, global map visualization radius
globalMapVisualizationPoseDensity: 5         # meters, global map visualization keyframe density
globalMapVisualizationLeafSize: 0.5             # meters, global map visualization cloud density

# visual iktree_map  
visulize_IkdtreeMap: true

# visual iktree_map  
recontructKdTree: true

# Export settings
savePCD: true                         # https://github.com/TixiaoShan/LIO-SAM/issues/3
savePCDDirectory: "/FAST_LIO_SAM/"        # in your home folder, starts and ends with "/". Warning: the code deletes "LOAM" folder then recreates it. See "mapOptimization" for implementation

